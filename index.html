<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#2563eb">

    <title>WorkTime Pro TR</title>

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

    <div class="headerTop">

        <div>

            <h1>📅 WorkTime Pro TR</h1>

            <p id="monthTitle"></p>

        </div>

        <button id="themeButton">
            🌙 Tema
        </button>

    </div>

</header>

<main>

<section class="card">

<h2>⚙️ Hesaplama</h2>

<label>Yıl</label>

<input
id="year"
type="number"
min="1900"
max="2100">

<label>Ay</label>

<select id="month">

<option value="0">Ocak</option>
<option value="1">Şubat</option>
<option value="2">Mart</option>
<option value="3">Nisan</option>
<option value="4">Mayıs</option>
<option value="5">Haziran</option>
<option value="6">Temmuz</option>
<option value="7">Ağustos</option>
<option value="8">Eylül</option>
<option value="9">Ekim</option>
<option value="10">Kasım</option>
<option value="11">Aralık</option>

</select>

<label>Günlük Çalışma Saati</label>

<input
id="dailyHour"
type="number"
step="0.01"
value="5.83">

<label class="checkbox">

<input
type="checkbox"
id="officialHoliday"
checked>

Türkiye Resmi Tatillerini Dahil Et

</label>

</section>

<section class="card">

<h2>🏖️ Ek İzinler</h2>

<input
type="date"
id="holidayDate">

<button id="addHoliday">

➕ İzin Ekle

</button>

<ul id="holidayList"></ul>

</section>

<section class="card">

<h2>📊 Sonuçlar</h2>

<div class="result-header">
<button id="exportButton" class="secondary">📤 CSV Olarak Dışa Aktar</button>
</div>

<div class="result">

<div>
<span>Toplam Gün</span>
<strong id="totalDays">0</strong>
</div>

<div>
<span>Pazar</span>
<strong id="sundayCount">0</strong>
</div>

<div>
<span>Resmi Tatil</span>
<strong id="officialCount">0</strong>
</div>

<div>
<span>Ek İzin</span>
<strong id="extraCount">0</strong>
</div>

<div>
<span>Çalışma Günü</span>
<strong id="workDay">0</strong>
</div>

<div>
<span>Toplam Saat</span>
<strong id="workHour">0.00</strong>
</div>

</div>

</section>

<section class="card">

<h2>🥧 Aylık Dağılım</h2>

<div class="chartBox">

<canvas id="chart"></canvas>

</div>

</section>

<section class="card">

<h2>📅 Takvim</h2>

<div id="calendar"></div>

</section>

</main>

<script src="holidays.js"></script>
<script src="storage.js"></script>
<script src="calendar.js"></script>
<script src="charts.js"></script>
<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("./service-worker.js");

}

</script>

</body>

</html>
